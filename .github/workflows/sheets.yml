name: SEAAP Automation

on:
  repository_dispatch:
    types: [run-seaap]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install playwright pandas gspread oauth2client
          playwright install

      - name: Ejecutar script
        env:
          SEAAP_USER: ${{ secrets.SEAAP_USER }}
          SEAAP_PASS: ${{ secrets.SEAAP_PASS }}
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: python main.py
